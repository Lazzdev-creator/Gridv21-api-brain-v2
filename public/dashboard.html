<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gridv21 Dashboard</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
 .container { max-width: 1200px; margin: 0 auto; }
  h1 { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
 .status { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; }
 .status.connected { background: #10b981; }
 .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
 .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
 .card h3 { color: #94a3b8; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
 .card.value { font-size: 32px; font-weight: 700; }
 .feed { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
 .feed h3 { margin-bottom: 15px; }
 .feed-item { padding: 12px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
 .feed-item:last-child { border-bottom: none; }
 .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
 .badge.lead { background: #10b981; color: #0f172a; }
 .badge.click { background: #3b82f6; }
 .login { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #334155; }
  input { background: #334155; border: 1px solid #475569; color: white; padding: 10px 12px; border-radius: 6px; width: 300px; }
  button { background: #3b82f6; border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-left: 10px; }
  button:hover { background: #2563eb; }
 .hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1><span class="status" id="status"></span>Gridv21 Live Dashboard</h1>

  <div class="login" id="loginBox">
    <input type="password" id="apiKey" placeholder="Enter ADMIN_KEY" />
    <button onclick="connect()">Connect</button>
  </div>

  <div id="dashboard" class="hidden">
    <div class="grid" id="stats">
      <div class="card"><h3>Total Leads</h3><div class="value" id="total_leads">0</div></div>
      <div class="card"><h3>Revenue</h3><div class="value" id="revenue">$0</div></div>
      <div class="card"><h3>Total Clicks</h3><div class="value" id="clicks">0</div></div>
      <div class="card"><h3>Live Posts</h3><div class="value" id="posts">0</div></div>
    </div>

    <div class="feed">
      <h3>Live Activity Feed</h3>
      <div id="feed-list"></div>
    </div>
  </div>
</div>

<script>
let eventSource = null
let apiKey = ''

async function connect() {
  apiKey = document.getElementById('apiKey').value
  if (!apiKey) return alert('Enter your ADMIN_KEY')

  try {
    const res = await fetch('/api/stats', { headers: { 'x-api-key': apiKey } })
    if (!res.ok) throw new Error('Invalid key')

    document.getElementById('loginBox').classList.add('hidden')
    document.getElementById('dashboard').classList.remove('hidden')

    await loadStats()
    connectSSE()
    setInterval(loadStats, 30000) // refresh stats every 30s
  } catch (e) {
    alert('Connection failed: ' + e.message)
  }
}

async function loadStats() {
  const res = await fetch('/api/stats', { headers: { 'x-api-key': apiKey } })
  const data = await res.json()
  document.getElementById('total_leads').textContent = data.total_leads
  document.getElementById('revenue').textContent = '$' + data.estimated_revenue
  document.getElementById('clicks').textContent = data.total_clicks
  document.getElementById('posts').textContent = data.live_posts
}

function connectSSE() {
  if (eventSource) eventSource.close()

  eventSource = new EventSource(`/api/live-feed?key=${apiKey}`)

  eventSource.onopen = () => {
    document.getElementById('status').classList.add('connected')
  }

  eventSource.onmessage = (e) => {
    const msg = JSON.parse(e.data)
    if (msg.type === 'init') {
      msg.data.forEach(lead => addFeedItem('lead', `New ${lead.type} lead: ${lead.name || lead.email}`))
    }
    if (msg.type === 'lead') {
      addFeedItem('lead', `New ${msg.data.type} lead: ${msg.data.name || msg.data.email}`)
      loadStats()
    }
    if (msg.type === 'click') {
      addFeedItem('click', `Click on tool_id ${msg.data.tool_id}`)
      loadStats()
    }
  }

  eventSource.onerror = () => {
    document.getElementById('status').classList.remove('connected')
    setTimeout(() => connectSSE(), 5000)
  }
}

function addFeedItem(type, text) {
  const feed = document.getElementById('feed-list')
  const item = document.createElement('div')
  item.className = 'feed-item'
  item.innerHTML = `<span>${text}</span><span class="badge ${type}">${type}</span>`
  feed.prepend(item)
  if (feed.children.length > 25) feed.removeChild(feed.lastChild)
}
</script>
</body>
  </html>
