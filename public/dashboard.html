<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIDV21 v5.5.9 DEBUG</title>
<style>
body{background:#0a0e27;color:#e0e6ff;font-family:system-ui;padding:15px}
.card{background:#11152b;border:1px solid #1e2342;border-radius:12px;padding:15px;margin:10px 0}
.menu-btn{position:fixed;top:15px;right:15px;z-index:9999;background:#00a8ff;color:#000;border:none;padding:10px 15px;border-radius:8px;font-size:20px}
</style>
</head>
<body>
<button class="menu-btn" onclick="alert('Button works!')">☰</button>
<h1>GRIDV21 v5.5.9 DEBUG MODE</h1>

<div class="card">
  <h3>Total Leads: <span id="total_leads">0</span></h3>
  <h3>Revenue: <span id="revenue">$0</span></h3>
  <h3>DMs: <span id="dms">0</span></h3>
  <h3>OS: <span id="os_count">0/12</span></h3>
</div>

<div class="card">
  <h3>Permits</h3>
  <div id="permitsList">Loading...</div>
</div>

<div class="card">
  <h3>Events</h3>
  <div id="events">Booting...</div>
</div>

<script>
console.log('🚀 v5.5.9 script started');

// SAFE DOM GETTER
function getEl(id) {
  const el = document.getElementById(id);
  if (!el) console.warn('Element not found:', id);
  return el;
}

function addEvent(text) {
  const el = getEl('events');
  if (el) el.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${text}</div>`;
}

async function safeFetch(url, fallback = []) {
  try {
    console.log('Fetching:', url);
    addEvent('Fetching ' + url);
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    console.log('Success:', url, data);
    addEvent(url + ' OK');
    return data;
  } catch (err) {
    console.error('Fetch failed:', url, err);
    addEvent(url + ' FAILED: ' + err.message);
    return fallback;
  }
}

// TEST 1: Does DOM work?
window.addEventListener('load', () => {
  addEvent('DOM loaded');
  getEl('total_leads').textContent = '999'; // test write
  setTimeout(testAPIs, 1000);
});

// TEST 2: Do APIs work?
async function testAPIs() {
  addEvent('Testing APIs...');
  
  const permits = await safeFetch('/api/permits-recent');
  getEl('total_leads').textContent = permits.length;
  getEl('permitsList').innerHTML = permits.length ? 
    permits.map(p => `<div>${p.city || 'Unknown'} - ${p.value || 0}</div>`).join('') : 
    'No permits - API returned empty array';
  
  const metrics = await safeFetch('/api/metrics', {});
  getEl('dms').textContent = metrics.dms_sent || 0;
  getEl('revenue').textContent = '$' + (metrics.est_revenue_month || 0);
  
  const os = await safeFetch('/api/os-status');
  getEl('os_count').textContent = os.filter(o => o.status === 'active').length + '/12';
  
  addEvent('All tests done. If you see this, JS is alive!');
}

// MOCK DATA IF APIs FAIL
if (typeof fetch === 'undefined') {
  addEvent('ERROR: fetch not supported on this browser');
}
</script>
</body>
</html>
