<h3>🔥 Recent Permits - Live Feed</h3>
<table id="permitsTable" border="1" style="width:100%; margin-top:10px">
  <thead>
    <tr>
      <th>City</th>
      <th>Permit Type</th>
      <th>Contractor</th>
      <th>Status</th>
      <th>Issued</th>
    </tr>
  </thead>
  <tbody id="permitsBody"></tbody>
</table>

<script>
async function loadPermits() {
  const res = await fetch('/api/permits-recent')
  const permits = await res.json()
  const tbody = document.getElementById('permitsBody')
  
  tbody.innerHTML = permits.map(p => `
    <tr>
      <td>${p.city}</td>
      <td>${p.permit_type || 'N/A'}</td>
      <td>${p.contractor_name || 'N/A'}</td>
      <td>${p.status}</td>
      <td>${p.issued_date ? new Date(p.issued_date).toLocaleDateString() : 'N/A'}</td>
    </tr>
  `).join('')
}

loadPermits()
setInterval(loadPermits, 30000) // auto refresh every 30s
</script>
