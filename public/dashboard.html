<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIDV21 VC Master Build v5.0.0</title>
<style>
:root { --blue: #00a8ff; --dark: #0a0e27; --card: #11152b; --text: #e0e6ff; }
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;padding:15px}
.header{display:flex;align-items:center;gap:15px;margin-bottom:20px;border-bottom:2px solid var(--blue);padding-bottom:15px}
.logo{width:50px;height:50px;background:radial-gradient(circle,var(--blue),#0066cc);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:18px;color:#fff}
h1{font-size:20px;color:var(--blue)}
.sub{font-size:11px;opacity:0.7}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:15px}
.card{background:var(--card);border:1px solid #1e2342;border-radius:12px;padding:15px;box-shadow:0 0 20px rgba(0,168,255,0.1)}
.card h3{font-size:12px;opacity:0.6;margin-bottom:8px;text-transform:uppercase}
.card .value{font-size:32px;font-weight:bold;color:var(--blue)}
.card .subvalue{font-size:11px;opacity:0.7;margin-top:4px}
.full{grid-column:1/-1}
.btn{background:var(--blue);color:#000;border:none;padding:12px;border-radius:8px;font-weight:bold;width:100%;margin:5px 0;cursor:pointer}
.btn:active{opacity:0.7}
.activity-item{padding:10px 0;border-bottom:1px solid #1e2342;font-size:13px}
.activity-time{font-size:10px;opacity:0.5}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#00ff88;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.tenant-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1e2342;font-size:13px}
.badge{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:bold}
.badge-hot{background:#ff3366;color:#fff}
.badge-warm{background:#ffaa00;color:#000}
</style>
</head>
<body>

<div class="header">
  <div class="logo">GV</div>
  <div>
    <h1>GRIDV21 <span id="version">v5.0.0</span></h1>
    <div class="sub">VC MASTER BUILD V1 • <span class="status-dot"></span>Engine Online</div>
  </div>
</div>

<div class="grid">
  <div class="card">
    <h3>Total Leads</h3>
    <div class="value" id="total_leads">0</div>
    <div class="subvalue">From permit portals</div>
  </div>
  <div class="card">
    <h3>Est. Revenue/Month</h3>
    <div class="value" id="revenue">$0</div>
    <div class="subvalue">$150 + $5 AI fee</div>
  </div>
  <div class="card">
    <h3>DMs Sent</h3>
    <div class="value" id="dms">0</div>
    <div class="subvalue">WhatsApp outreach</div>
  </div>
  <div class="card">
    <h3>OS Active</h3>
    <div class="value" id="os_count">12/12</div>
    <div class="subvalue">All modules online</div>
  </div>
</div>

<div class="card full">
  <h3>🧠 Live Events Feed</h3>
  <div id="events">
    <div class="activity-item">Loading events...</div>
  </div>
</div>

<div class="card full">
  <h3>🏢 Tenants Control</h3>
  <div id="tenants">
    <div class="tenant-row">No tenants yet</div>
  </div>
</div>

<div class="card full">
  <h3>⚡ Quick Actions</h3>
  <button class="btn" onclick="forceScan()">⚡ Force Scan - Acquisition OS</button>
  <button class="btn" onclick="testLead()">➕ Add Test Lead</button>
  <button class="btn" onclick="checkEngine()">🧠 Engine Health</button>
</div>

<script>
let eventCounter = 0;

async function loadMetrics() {
  try {
    const r = await fetch('/api/metrics');
    const d = await r.json();
    document.getElementById('total_leads').textContent = d.total_leads || 0;
    document.getElementById('revenue').textContent = '$' + (d.est_revenue_month || 0).toLocaleString();
    document.getElementById('dms').textContent = d.dms_sent || 0;
    document.getElementById('os_count').textContent = (d.brain_os_active || 12) + '/12';
    
    // Load tenants
    const leads = await fetch('/api/leads-recent').then(r=>r.json()).catch(()=>[]);
    const tenantsDiv = document.getElementById('tenants');
    if(leads.length > 0) {
      tenantsDiv.innerHTML = leads.map(l => `
        <div class="tenant-row">
          <span>${l.region || 'Unknown'} - ${l.trade_type}</span>
          <span class="badge ${l.value_estimate > 50000 ? 'badge-hot' : 'badge-warm'}">$${l.value_estimate}</span>
        </div>
      `).join('');
    } else {
      tenantsDiv.innerHTML = '<div class="tenant-row">No leads yet. Run scan to populate.</div>';
    }
  } catch(e) { console.log('Metrics error:', e) }
}

function addEvent(text, type='info') {
  eventCounter++;
  const time = new Date().toLocaleTimeString();
  const eventsDiv = document.getElementById('events');
  const item = document.createElement('div');
  item.className = 'activity-item';
  item.innerHTML = `${text}<div class="activity-time">${time}</div>`;
  eventsDiv.insertBefore(item, eventsDiv.firstChild);
  if(eventsDiv.children.length > 10) eventsDiv.removeChild(eventsDiv.lastChild);
}

async function forceScan() {
  addEvent('⚡ Acquisition Intelligence OS triggered scan...', 'scan');
  const r = await fetch('/api/scrape-now');
  const d = await r.json();
  addEvent(`Scan complete: ${d.permits_found} new permits found`, d.permits_found > 0 ? 'success' : 'info');
  loadMetrics();
}

async function testLead() {
  addEvent('➕ Adding test tenant lead...', 'add');
  const r = await fetch('/api/test-insert');
  const d = await r.json();
  addEvent(`Test lead created: $${d.lead.value_estimate} ${d.lead.trade_type}`, 'success');
  loadMetrics();
}

async function checkEngine() {
  const r = await fetch('/api/test');
  const d = await r.json();
  addEvent(`Engine v${d.version}: ${d.engine}`, 'engine');
  alert(`Engine: ${d.engine}\nVersion: ${d.version}\nOS: 12/12 Active`);
}

// Live updates every 3 seconds
loadMetrics();
setInterval(loadMetrics, 3000);
addEvent('Dashboard v5.0.0 initialized - VC Master Build', 'boot');
</script>
</body>
    </html>
