<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIDV21 Brain Control v5.5.8</title>
<style>
:root { --blue: #00a8ff; --dark: #0a0e27; --card: #11152b; --text: #e0e6ff; --green: #00ff88; --pink: #ff3366; --grey: #333; }
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'Segoe UI',sans-serif;padding:15px;min-height:100vh}
.header{display:flex;align-items:center;gap:15px;margin-bottom:20px;border-bottom:2px solid var(--blue);padding-bottom:15px}
.logo{width:50px;height:50px;background:radial-gradient(circle,var(--blue),#0066cc);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:18px;color:#fff}
h1{font-size:20px;color:var(--blue)}
.sub{font-size:11px;opacity:0.7}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:15px}
.card{background:var(--card);border:1px solid #1e2342;border-radius:12px;padding:15px;box-shadow:0 0 20px rgba(0,168,255,0.1)}
.card h3{font-size:12px;opacity:0.6;margin-bottom:8px;text-transform:uppercase}
.card .value{font-size:32px;font-weight:bold;color:var(--blue)}
.full{grid-column:1/-1}
.btn{background:var(--blue);color:#000;border:none;padding:12px;border-radius:8px;font-weight:bold;width:100%;margin:5px 0;cursor:pointer}
.btn:active{opacity:0.7;transform:scale(0.98)}
.btn-green{background:var(--green);color:#000}
.btn-pink{background:var(--pink);color:#fff}
.activity-item{padding:10px 0;border-bottom:1px solid #1e2342;font-size:13px}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.permit-row{display:flex;justify-content:space-between;padding:12px 8px;border-bottom:1px solid #1e2342;cursor:pointer}
.permit-row:hover{background:rgba(0,168,255,0.1)}
.os-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.os-btn{padding:10px;font-size:11px;border-radius:8px;border:none;cursor:pointer;font-weight:bold}
.os-btn.active{background:var(--green);color:#000}
.os-btn.inactive{background:var(--grey);color:#999}

.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:1000;align-items:center;justify-content:center}
.modal-content{background:var(--card);padding:20px;border-radius:12px;width:90%;max-width:420px;max-height:90vh;overflow-y:auto}
</style>
</head>
<body>

<div class="header">
  <div class="logo">GV</div>
  <div>
    <h1>GRIDV21 <span id="version">v5.5.8</span></h1>
    <div class="sub">BRAIN CONTROL CENTER • <span class="status-dot"></span> LIVE</div>
  </div>
  <div style="margin-left:auto">
    <button class="btn" onclick="showMenu()">☰ MENU</button>
  </div>
</div>

<div class="grid">
  <div class="card"><h3>Total Permits</h3><div class="value" id="total_leads">0</div></div>
  <div class="card"><h3>Est. Revenue/Month</h3><div class="value" id="revenue">$0</div></div>
  <div class="card"><h3>Revenue Events</h3><div class="value" id="dms">0</div></div>
  <div class="card"><h3>OS Active</h3><div class="value" id="os_count">12/12</div></div>
</div>

<div class="card full"><h3>📄 Permit Feed</h3><div id="permitFeed">Loading...</div></div>
<div class="card full"><h3>🧠 Live Events Feed</h3><div id="events">Booting brain...</div></div>

<div class="card full">
  <h3>⚡ Quick Actions</h3>
  <button class="btn" onclick="forceScan()">⚡ Force Scan</button>
  <button class="btn" onclick="checkEngine()">🧠 Engine Health</button>
</div>

<!-- MENU MODAL -->
<div id="menuModal" class="modal">
  <div class="modal-content">
    <h3>🎛️ OS Control Panel</h3>
    <div id="modalOS" class="os-grid" style="margin:15px 0"></div>
    <button class="btn btn-green" onclick="activateAllOS()">Activate All OS</button>
    <button class="btn btn-pink" onclick="deactivateAllOS()">Deactivate All OS</button>
    <button onclick="hideMenu()" style="margin-top:10px;width:100%">Close Menu</button>
  </div>
</div>

<script>
let loading = false;

function addEvent(text) {
  const ev = document.getElementById('events');
  const item = document.createElement('div');
  item.className = 'activity-item';
  item.innerHTML = `${text} <small>${new Date().toLocaleTimeString()}</small>`;
  ev.insertBefore(item, ev.firstChild);
  if (ev.children.length > 20) ev.removeChild(ev.lastChild);
}

async function loadDashboard() {
  if (loading) return;
  loading = true;
  try {
    const res = await fetch('/api/dashboard');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    // Update metrics
    const m = data.metrics || {};
    document.getElementById('total_leads').textContent = m.total_leads || 0;
    document.getElementById('revenue').textContent = '$' + Number(m.est_revenue_month || 0).toLocaleString();
    document.getElementById('dms').textContent = m.dms_sent || 0;
    document.getElementById('os_count').textContent = (m.os_active || 12) + '/12';

    // Permit feed
    const feed = document.getElementById('permitFeed');
    feed.innerHTML = (data.permits && data.permits.length) 
      ? data.permits.map(p => `<div class="permit-row">${p.city || ''} - ${p.permit_type || 'Unknown'}</div>`).join('')
      : '<div style="opacity:0.6;padding:15px;text-align:center">No permits yet • Run Force Scan</div>';

    addEvent('✅ Dashboard updated');
  } catch(e) {
    console.error(e);
    addEvent('⚠️ Dashboard error — check Render logs');
  } finally {
    loading = false;
  }
}

async function forceScan() {
  addEvent('⚡ Force Scan started...');
  try {
    const r = await fetch('/api/scrape-now', {method: 'POST'});
    const d = await r.json();
    addEvent(`✅ Scan finished: ${d.permits_found || 0} permits`);
    loadDashboard();
  } catch(e) { addEvent('❌ Scan failed'); }
}

async function checkEngine() {
  try {
    const r = await fetch('/api/test');
    const d = await r.json();
    addEvent(`Engine OK | OS Active: ${d.os_active}/12`);
  } catch(e) { addEvent('Engine check failed'); }
}

// Menu
function showMenu() {
  document.getElementById('menuModal').style.display = 'flex';
  loadDashboard();
}
function hideMenu() {
  document.getElementById('menuModal').style.display = 'none';
}

async function activateAllOS() {
  addEvent('Activating all 12 OS...');
  for(let i=1; i<=12; i++) {
    try { await fetch(`/api/os-toggle/${i}`, {method:'POST'}); } catch(e){}
  }
  addEvent('All OS Activated');
  hideMenu();
  loadDashboard();
}

async function deactivateAllOS() {
  addEvent('Deactivating all OS...');
  for(let i=1; i<=12; i++) {
    try { await fetch(`/api/os-toggle/${i}`, {method:'POST'}); } catch(e){}
  }
  addEvent('All OS Deactivated');
  hideMenu();
  loadDashboard();
}

// BOOT
addEvent('🚀 GRIDV21 v5.5.8 Brain Control Started');
loadDashboard();
setInterval(loadDashboard, 8000);
</script>
</body>
      </html>
