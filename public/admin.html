<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>GRIDV21 ADMIN</title>

<link rel="stylesheet"
href="styles.css">

</head>

<body>

<h2>ADMIN CONTROL</h2>

<div class="card">

<h3>Tenants Monitor</h3>

<div id="tenants"></div>

</div>

<div class="card">

<h3>Affiliate Tracking</h3>

<div id="affiliates"></div>

</div>

<script>

async function loadTenants(){

const r=await fetch('/api/tenants');
const d=await r.json();

document.getElementById('tenants').innerHTML=

d.map(t=>`

<div>

ID:${t.id}<br>

Status:${t.status}<br>

Plan:${t.subscription}<br>

Last Seen:${t.updated_at}

</div><hr>

`).join('');

}

async function loadAffiliates(){

const r=await fetch('/api/affiliates');
const d=await r.json();

document.getElementById('affiliates').innerHTML=

d.map(a=>`

<div>

${a.product}<br>

Clicks:${a.clicks}<br>

Conversions:${a.conversions}<br>

Revenue:$${a.revenue}

</div><hr>

`).join('');

}

loadTenants();
loadAffiliates();

</script>

</body>
</html>
