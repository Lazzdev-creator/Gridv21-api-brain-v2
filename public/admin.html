<!DOCTYPE html>
<html>
<head>
<title>GridV21 Admin</title>
<style>
body{background:#0a0a0a;color:#0f0;font-family:Arial;padding:30px}
.card{background:#1a1a1a;border:1px solid #0f0;border-radius:10px;padding:20px;margin:15px 0}
h1{color:#0ff}
</style>
</head>
<body>
<h1>GridV21 Admin Dashboard v4.4.0</h1>
<div id="stats">Loading...</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const key = urlParams.get('key');

// Your secret key - must match URL
const ADMIN_KEY = 'T578ij74de34vgh9km65vcds32sa9kb5';

if(key !== ADMIN_KEY) {
  document.getElementById('stats').innerHTML = 
  '<h2 style="color:red">Error loading. Check ADMIN_KEY in URL.</h2>';
} else {
  fetch('/api/forecast')
  .then(r => r.json())
  .then(d => {
    document.getElementById('stats').innerHTML = `
      <div class="card">
        <h3>Total Leads</h3>
        <h2>Loading...</h2>
      </div>
      <div class="card">
        <h3>Est. Revenue</h3>
        <h2>$${d.monthly_projection}</h2>
        <p>$150 contractor / $5 AI</p>
      </div>
      <div class="card">
        <h3>Mode</h3>
        <h2>${d.mode}</h2>
        <p>Email: ${d.email}</p>
      </div>
      <div class="card">
        <h3>Live Posts</h3>
        <h2>0</h2>
        <p>Auto-published</p>
      </div>
    `;
  })
  .catch(e => {
    document.getElementById('stats').innerHTML = 
    '<h2 style="color:red">API Error: ' + e.message + '</h2>';
  });
}
</script>
</body>
</html>
