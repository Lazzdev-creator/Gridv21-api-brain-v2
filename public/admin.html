<!DOCTYPE html>
<html>
<head>
<title>GridV21 Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#0a0a0a;color:#0f0;font-family:'Courier New', monospace;padding:20px;margin:0}
.card{background:#1a1a1a;border:2px solid #0f0;border-radius:12px;padding:25px;margin:15px 0;box-shadow:0 0 20px rgba(0,255,0,0.2)}
h1{color:#0ff;text-align:center;font-size:24px;margin-bottom:30px;text-shadow:0 0 10px #0ff}
h3{color:#0f0;margin:0;font-size:14px;text-transform:uppercase;letter-spacing:2px}
h2{color:#fff;font-size:36px;margin:10px 0;font-weight:bold}
p{color:#888;font-size:12px;margin:5px 0}
.btn{width:100%;padding:15px;margin:8px 0;background:#0f0;color:#000;border:none;border-radius:8px;font-weight:bold;font-size:16px;cursor:pointer;font-family:'Courier New'}
.btn:hover{background:#0ff;box-shadow:0 0 15px #0ff}
.btn-red{background:#f00;color:#fff}
.btn-red:hover{background:#ff0;color:#000}
.error{color:red;text-align:center;font-size:20px;padding:50px}
.loading{animation:blink 1s infinite}
@keyframes blink{50%{opacity:0.5}}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>

}
