<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRIDV21 Brain Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="authBox" style="display:none; padding:40px;">
    <h2>GRIDV21 Login</h2>
    <input id="email" type="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
    <a href="/auth/google"><button>Login with Google</button></a>
  </div>

  <div id="panel" style="display:none; padding:20px;">
    <header>
      <h1>GRIDV21 Brain v5.5.10</h1>
      <button onclick="logout()">Logout</button>
    </header>

    <section class="metrics">
      <div class="card"><b>Total Leads</b><div id="total_leads">0</div></div>
      <div class="card"><b>Revenue MTD</b><div id="est_revenue">$0</div></div>
      <div class="card"><b>OS Active</b><div id="os_active">0</div></div>
      <div class="card"><b>DMS Sent</b><div id="dms_sent">0</div></div>
    </section>

    <h2>Recent Permits - Denver</h2>
    <div id="data" class="grid"></div>

    <h2>12 OS Modules</h2>
    <div id="os_grid" class="grid"></div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
